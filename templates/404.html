<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Kevin Crowley</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #18181f;
            --border: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #3b82f6;
        }
        
        [data-theme="light"] {
            --bg-primary: #faf6f0;
            --bg-secondary: #f0ebe3;
            --bg-card: #fdfcfa;
            --border: #e0d8cc;
            --text-primary: #3d3529;
            --text-secondary: #5c5245;
            --text-muted: #8a7f72;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        
        p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        a {
            display: inline-block;
            padding: 12px 32px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        a:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Lost in the Cloud?</h1>
        <p>This page doesn't exist. It may have been moved, deleted, or perhaps it never was.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
