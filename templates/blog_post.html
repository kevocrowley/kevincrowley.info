<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - Kevin Crowley</title>
    <meta name="description" content="{{ post.title }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #18181f;
            --border: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-muted: rgba(59, 130, 246, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
        }

        nav {
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 48px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--accent);
        }

        article h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
            line-height: 1.3;
        }

        article h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin-top: 36px;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        article h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 28px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        article p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        article code {
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9rem;
            color: var(--accent);
        }

        article pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin: 24px 0;
        }

        article pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
        }

        article ul, article ol {
            color: var(--text-secondary);
            margin-left: 24px;
            margin-bottom: 20px;
        }

        article li {
            margin-bottom: 8px;
        }

        article a {
            color: var(--accent);
            text-decoration: none;
        }

        article a:hover {
            text-decoration: underline;
        }

        article blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 20px;
            margin: 24px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        article hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 32px 0;
        }

        @media (max-width: 768px) {
            article h1 { font-size: 1.6rem; }
            .container { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">&larr; Back to Home</a>
        </nav>
        <article>
            <h1>{{ post.title }}</h1>
            {{ post.html|safe }}
        </article>
    </div>
</body>
</html>
